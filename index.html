<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🦌 Квиз: Путешествие по Хабаровскому краю</title>
    <!-- Подключаем шрифт Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* СТИЛИ ОСТАЛИСЬ БЕЗ ИЗМЕНЕНИЙ (только улучшена адаптивность) */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(145deg, #0a3b2e 0%, #1e5a3a 100%);
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M20 30 Q 40 10 60 30 T 100 30" stroke="white" fill="none" stroke-width="2"/><path d="M10 70 Q 30 50 50 70 T 90 70" stroke="white" fill="none" stroke-width="2"/><circle cx="15" cy="20" r="2" fill="white"/><circle cx="80" cy="60" r="2" fill="white"/></svg>');
            background-size: 80px 80px;
            pointer-events: none;
        }

        .quiz-card {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 249, 220, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            border: 3px solid #f3c74d;
            position: relative;
            z-index: 10;
            transition: 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1e3f2f;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #f3c74d;
            margin: 0;
        }

        .score-box {
            background: #2d5e3b;
            padding: 12px 20px;
            border-radius: 60px;
            color: #ffefb2;
            font-weight: 700;
            font-size: 1.4rem;
            border: 2px solid #ffd966;
            box-shadow: inset 0 -2px 0 #1d3a25;
        }

        .progress {
            height: 14px;
            background: #d0b17a;
            border-radius: 50px;
            margin: 20px 0 20px;
            overflow: hidden;
            border: 1px solid #84613b;
        }

        .progress-bar {
            height: 14px;
            background: linear-gradient(90deg, #f8b62d, #ffd966);
            width: 5%;
            border-radius: 50px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px #ffb82e;
        }

        .image-area {
            width: 100%;
            height: 150px;
            background: #c0b28a;
            border-radius: 40px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 5px solid #f7d970;
            box-shadow: 0 10px 0 #7a5c2e;
        }

        .image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f4437;
            line-height: 1.3;
            margin-bottom: 25px;
            padding: 0 8px;
            text-shadow: 1px 1px 0 rgba(255,255,200,0.8);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #faf2d7;
            border: 3px solid #7ea86a;
            border-radius: 100px;
            padding: 16px 28px;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f4f2b;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: 0.15s;
            cursor: pointer;
            box-shadow: 0 6px 0 #4d6b3d;
            letter-spacing: 0.5px;
        }

        .option-btn:hover {
            background: #ffeaa6;
            border-color: #f3b33d;
            transform: scale(1.02);
        }

        .option-btn.selected {
            background: #ffe084;
            border-color: #c8821e;
            box-shadow: 0 3px 0 #7a4f1a;
            transform: translateY(3px);
        }

        .option-letter {
            background: #3d6b4b;
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.5rem;
            box-shadow: 0 4px 0 #1e3224;
        }

        .action-btn {
            background: #ef9b2b;
            border: none;
            border-radius: 60px;
            padding: 18px 30px;
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            width: 100%;
            border-bottom: 8px solid #9e601d;
            transition: 0.07s;
            cursor: pointer;
            letter-spacing: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .action-btn:active {
            border-bottom-width: 3px;
            transform: translateY(5px);
        }

        .fact-box {
            margin-top: 30px;
            background: #e6dbb0;
            border-left: 12px solid #3f7846;
            padding: 18px 20px;
            border-radius: 30px;
            font-size: 1.15rem;
            color: #1d3a2c;
            font-weight: 500;
            box-shadow: inset 0 -2px 0 #9b884a;
        }

        .result-area {
            text-align: center;
            padding: 25px 10px;
        }

        .result-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: #e6b422;
            text-shadow: 5px 5px 0 #2b5330;
            margin-bottom: 15px;
        }

        .result-score {
            font-size: 2.2rem;
            background: #2a5c3e;
            display: inline-block;
            padding: 15px 35px;
            border-radius: 80px;
            color: #ffe68f;
            border: 4px solid #ffc857;
            margin: 20px 0;
            font-weight: 700;
        }

        .status-badge {
            font-size: 2rem;
            font-weight: 800;
            background: gold;
            padding: 15px 20px;
            border-radius: 60px;
            display: inline-block;
            color: #1f4d2b;
            border: 4px dashed white;
        }

        .restart-btn {
            margin-top: 40px;
            background: #575f4b;
            border-bottom-color: #2b2e23;
        }

        @media (max-width: 600px) {
            .quiz-card { padding: 20px; }
            .title h1 { font-size: 1.5rem; }
            .question-text { font-size: 1.5rem; }
            .option-btn { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>

        <!-- КОНТЕЙНЕР ДЛЯ ДИНАМИЧЕСКОГО КОНТЕНТА -->

                    correct: 1,
                    fact: "🌊 Залив Академии — часть Охотского моря, у Тугуро-Чумиканского района.",
                    image: "images/img_14.png"
                },
                {

                    options: ["Лиственница", "Кедр корейский", "Ель", "Пихта"],
                    correct: 1,
                    fact: "🌲 Кедр корейский — даёт орехи, основа питания многих животных.",
                    image: "images/img_15.png"
                },
                {
                    question: "Как называются острова в Охотском море, известные китами и туманами?",
                    options: ["Курилы", "Шантарские", "Командоры", "Сахалин"],
                    correct: 1,
                    fact: "🐋 Шантарские острова — труднодоступный рай для туристов и экологов.",
                    image: "images/img_16.png"
                },
                {
                    question: "Какой вид лосося массово идёт на нерест в реки края?",
                    options: ["Кета", "Форель", "Сиг", "Таймень"],
                    correct: 0,
                    fact: "🐟 Кета — главная промысловая рыба Хабаровского края, красная икра.",
                    image: "images/img_17.png"
                },
                {
                    question: "Какой заповедник находится в окрестностях Хабаровска?",
                    options: ["Большехехцирский", "Хехцир", "Вяземский", "Хорский"],
                    correct: 0,
                    fact: "🌳 Заповедник «Большехехцирский» расположен на сопках Хехцир, рядом с Хабаровском.",
                    image: "images/img_18.png"
                },
                {
                    question: "Сколько районов в Хабаровском крае?",
                    options: ["15", "17", "19", "22"],
                    correct: 1,
                    fact: "📊 Хабаровский край включает 17 муниципальных районов.",
                    image: "images/img_19.png"
                }
            ];

            // -------------------------------
            // Состояние игры
            // -------------------------------
            let currentIndex = 0;
            let playerScore = 0;
            let selectedOption = null;
            let isAnswered = false;
            let canAdvance = true;

            const dynamicEl = document.getElementById('dynamicContent');
            const scoreEl = document.getElementById('scoreDisplay');
            const progressBar = document.getElementById('progressBar');

            // -------------------------------
            // Функции рендера (без изменений)
            // -------------------------------
            function renderWelcome() {
                const welcomeHtml = `
                    <div style="text-align: center;">
                        <div class="image-area">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 180'%3E%3Crect width='300' height='180' fill='%233f7352'/%3E%3Ccircle cx='150' cy='90' r='60' fill='%23ffc857'/%3E%3Cpath d='M130 40 L150 0 L170 40 Z' fill='%23faaa3a'/%3E%3Ctext x='40' y='150' fill='white' font-size='22' font-weight='bold'%3E🌏 ХАБАРОВСКИЙ КРАЙ%3C/text%3E%3C/svg%3E" alt="Природа края">
                        </div>
                        <div style="font-size: 2.2rem; font-weight: 800; color: #26532b; margin: 20px 0 10px;">ПУТЕШЕСТВИЕ НАЧИНАЕТСЯ</div>
                        <p style="font-size: 1.3rem; background: #ffe28c; padding: 18px; border-radius: 50px; margin: 20px 0; font-weight: 600;">🗿 20 вопросов о природе, истории и людях Хабаровского края</p>
                        <button class="action-btn" id="startQuizBtn">▶ СТАРТ</button>
                    </div>
                `;
                dynamicEl.innerHTML = welcomeHtml;
                document.getElementById('startQuizBtn')?.addEventListener('click', startQuiz);
            }

            function startQuiz() {
                currentIndex = 0;
                playerScore = 0;
                updateScore();
                renderQuestion();
            }

            function renderQuestion() {
                if (currentIndex >= questions.length) {
                    showFinalResult();
                    return;
                }

                const q = questions[currentIndex];
                selectedOption = null;
                isAnswered = false;
                canAdvance = true;

                const letters = ['А', 'Б', 'В', 'Г'];
                let optionsHtml = '';
                q.options.forEach((opt, idx) => {
                    optionsHtml += `
                        <div class="option-btn" data-opt-index="${idx}">
                            <span class="option-letter">${letters[idx]}</span>
                            ${opt}
                        </div>
                    `;
                });

                const progressPercent = ((currentIndex) / questions.length) * 100;
                progressBar.style.width = progressPercent + '%';

                const html = `
                    <div class="image-area">
                        <img id="questionImage"  alt="Изображение к вопросу">
                    </div>
                    <div class="question-text">${currentIndex+1}. ${q.question}</div>
                    <div class="options" id="optionsContainer">
                        ${optionsHtml}
                    </div>
                    <button class="action-btn" id="submitAnswerBtn" ${!canAdvance ? 'disabled' : ''}>✅ ОТВЕТИТЬ</button>
                    <div id="factContainer" style="display: none;" class="fact-box"></div>
                `;

                dynamicEl.innerHTML = html;
                const img = document.getElementById("questionImage");
                console.log("IMAGE PATH:", q.image);
                // принудительно обновляем src
                img.src = "";
                img.src = q.image;
                 const next = questions[currentIndex + 1];

                 if (next && next.image) {
                    const preload = new Image();
                    preload.src = next.image;
                }

                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        if (isAnswered) return;
                        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                        this.classList.add('selected');
                        selectedOption = parseInt(this.dataset.optIndex);
                    });
                });

                document.getElementById('submitAnswerBtn').addEventListener('click', function() {
                    if (selectedOption === null) {
                        alert('❓ Сначала выберите ответ!');
                        return;
                    }
                    if (isAnswered) return;
                    isAnswered = true;
                    checkAnswer(selectedOption);
                });
            }

            function checkAnswer(selectedIdx) {
                const q = questions[currentIndex];
                const isCorrect = (selectedIdx === q.correct);
                if (isCorrect) {
                    playerScore++;
                    updateScore();
                }

                const factDiv = document.getElementById('factContainer');
                factDiv.style.display = 'block';
                const letters = ['А', 'Б', 'В', 'Г'];
                const correctLetter = letters[q.correct];
                const correctText = q.options[q.correct];
                const resultMsg = isCorrect ? '✅ ВЕРНО!' : '❌ НЕВЕРНО...';
                factDiv.innerHTML = `<span style="font-size:1.5rem; font-weight:800;">${resultMsg}</span><br> 
                                     <span style="background: #fad974; padding: 5px 15px; border-radius: 40px;">✓ Правильно: ${correctLetter} — ${correctText}</span><br>
                                     💡 <strong>Факт:</strong> ${q.fact}`;

                document.querySelectorAll('.option-btn').forEach((btn, idx) => {
                    btn.style.pointerEvents = 'none';
                    if (idx === q.correct) {
                        btn.style.background = '#a7e0a0';
                        btn.style.borderColor = '#1f7a1f';
                    } else if (idx === selectedIdx && !isCorrect) {
                        btn.style.background = '#f8b5b5';
                        btn.style.borderColor = '#b33a3a';
                    }
                });

                const submitBtn = document.getElementById('submitAnswerBtn');
                submitBtn.textContent = currentIndex === questions.length - 1 ? '🏁 ФИНАЛ' : '⏩ СЛЕДУЮЩИЙ';
                submitBtn.removeEventListener('click', checkAnswer);
                submitBtn.addEventListener('click', function nextStep() {
                    if (currentIndex < questions.length - 1) {
                        currentIndex++;
                        renderQuestion();
                    } else {
                        showFinalResult();
                    }
                });
            }

            function showFinalResult() {
                progressBar.style.width = '100%';
                let status = '';
                if (playerScore >= 18) status = '🏆 ХРАНИТЕЛЬ ТАЙГИ';
                else if (playerScore >= 13) status = '🎓 ЗНАТОК КРАЯ';
                else if (playerScore >= 8) status = '🌿 ПУТЕШЕСТВЕННИК';
                else status = '🥾 НОВИЧОК';
                

                const finalHtml = `
                    <div class="result-area">
                        <div class="result-title">ПУТЕШЕСТВИЕ ЗАВЕРШЕНО!</div>
                        <div class="image-area" style="height:180px;">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 180'%3E%3Crect width='300' height='180' fill='%23cf8f3a'/%3E%3Ctext x='40' y='110' fill='white' font-size='44' font-weight='bold'%3E🏆%3C/text%3E%3C/svg%3E">
                        </div>
                        <div class="result-score">🎯 ${playerScore} / 20</div>
                        <div class="status-badge">${status}</div>
                        <p style="margin-top: 35px; font-size:1.5rem;">Хабаровский край — удивительный!<br> Узнай больше!</p>
                        <button class="action-btn restart-btn" id="restartBtn">🔄 СЫГРАТЬ СНОВА</button>
                    </div>
                `;
                dynamicEl.innerHTML = finalHtml;
                document.getElementById('restartBtn').addEventListener('click', function() {
                    currentIndex = 0;
                    playerScore = 0;
                    updateScore();
                    renderWelcome();
                });
            }

            function updateScore() {
                scoreEl.innerText = `🏆 ${playerScore}`;
            }

            // Старт
            renderWelcome();
            updateScore();
        })();
    </script>

    
</body>
</html>
<script>
function sendScore(score) {
    fetch("http://127.0.0.1:8000/score", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            score: score
        })
    })
    .then(res => res.json())
    .then(data => console.log("Отправлено:", data))
    .catch(err => console.error("Ошибка:", err));
}
</script>
<script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="khv_Gamebot"
        data-size="large"
        data-on-auth="onTelegramAuth(user)">
</script>

<script>
function onTelegramAuth(user) {
    console.log("TG user:", user);

    fetch("http://127.0.0.1:8000/auth", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(user)
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user_id", user.id);
    });
}
</script>
